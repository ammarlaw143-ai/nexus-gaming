<!DOCTYPE html>\
<html lang="en">
  <head><meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Game Guides & Tutorials – NexusPlay</title>
<meta name="description" content="Expert game guides, walkthroughs, tips and tutorials for 100+ games. From beginner to pro."/>
<script src="shared.js"></script>

<style>
.guides-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.guide-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:.25s;display:flex;flex-direction:column;gap:10px}
.guide-card:hover{border-color:rgba(132,204,22,.35);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.4)}
.guide-tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 8px;border-radius:4px}
.gt-beginner{background:rgba(132,204,22,.12);color:var(--green);border:1px solid rgba(132,204,22,.25)}
.gt-intermediate{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
.gt-advanced{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.gt-walkthrough{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.25)}
.guide-card h3{font-size:15px;font-weight:700;color:#fff;line-height:1.4}
.guide-card p{font-size:12px;color:var(--muted);line-height:1.6;flex:1}
.guide-meta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--dim);border-top:1px solid var(--border);padding-top:10px}
.guide-views{display:flex;align-items:center;gap:4px}
</style>
</head>
  <body>
<script>document.write(renderAnnounce());document.write(renderNavbar('Guides'))</script>

<div class="page-header">
  <div class="page-header-inner">
    <div class="breadcrumb"><a href="index.html">Home</a> › <span style="color:#fff">Guides</span></div>
    <h1>📖 Guides & Tutorials</h1>
    <p>Expert-written guides for 100+ games — from beginner tips to advanced strategies and full walkthroughs.</p>
  </div>
</div>

<!-- CTA BANNER -->
<div style="background:linear-gradient(135deg,rgba(132,204,22,.1),rgba(132,204,22,.03));border-bottom:1px solid rgba(132,204,22,.15);padding:20px 32px">
  <div style="max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
    <div>
      <div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:4px">🏆 Most Popular Right Now</div>
      <div style="font-size:15px;color:#fff;font-weight:600">Elden Ring: Shadow of the Erdtree — Complete Boss Guide</div>
    </div>
    <a href="guides/elden-ring-boss-guide.html" class="btn-green">Read Guide →</a>
  </div>
</div>

<div class="section">
  <!-- Filter pills -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px">
    <span style="font-size:12px;color:var(--muted);line-height:32px;margin-right:4px">Filter by:</span>
    <button class="pill active" onclick="filterGuides(this,'')">All Guides</button>
    <button class="pill" onclick="filterGuides(this,'beginner')">Beginner</button>
    <button class="pill" onclick="filterGuides(this,'intermediate')">Intermediate</button>
    <button class="pill" onclick="filterGuides(this,'advanced')">Advanced</button>
    <button class="pill" onclick="filterGuides(this,'walkthrough')">Walkthroughs</button>
  </div>
  <div id="guides-grid" class="guides-grid"></div>
</div>

<div style="max-width:1300px;margin:0 auto;padding:0 32px 48px"><div class="ad-box">Advertisement</div></div>
<script>document.write(renderFooter())</script>

<style>
.pill{padding:7px 16px;border-radius:100px;border:1px solid var(--border);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;background:transparent;transition:.2s}
.pill:hover,.pill.active{border-color:var(--green);color:var(--green);background:rgba(132,204,22,.06)}
</style>
<script>
const GUIDES=[
  {id:1,game:"Elden Ring",title:"Elden Ring Complete Beginner's Guide — Everything You Need to Know",level:"beginner",type:"guide",views:"125,000",read:"20 min",slug:"elden-ring-beginners"},
  {id:2,game:"Elden Ring",title:"All Elden Ring Boss Locations — How to Beat Every Boss",level:"advanced",type:"guide",views:"89,000",read:"45 min",slug:"elden-ring-all-bosses"},
  {id:3,game:"Elden Ring",title:"Elden Ring: Shadow of the Erdtree — Full Walkthrough",level:"intermediate",type:"walkthrough",views:"210,000",read:"60 min",slug:"elden-ring-dlc-walkthrough"},
  {id:4,game:"Cyberpunk 2077",title:"Best Cyberpunk 2077 Builds 2026 — V Stat Guide",level:"intermediate",type:"guide",views:"67,000",read:"25 min",slug:"cyberpunk-builds"},
  {id:5,game:"Fortnite",title:"Fortnite Chapter 5 Season 2 — Complete Beginner's Guide",level:"beginner",type:"guide",views:"245,000",read:"15 min",slug:"fortnite-chapter5"},
  {id:6,game:"Fortnite",title:"Fortnite Building Guide — How to Build Like a Pro",level:"advanced",type:"guide",views:"180,000",read:"30 min",slug:"fortnite-building"},
  {id:7,game:"Genshin Impact",title:"Genshin Impact Resin Guide — Don't Waste a Single Drop",level:"beginner",type:"guide",views:"156,000",read:"12 min",slug:"genshin-resin"},
  {id:8,game:"Genshin Impact",title:"Best Genshin Impact Team Compositions 2026",level:"intermediate",type:"guide",views:"98,000",read:"28 min",slug:"genshin-teams"},
  {id:9,game:"Valorant",title:"Valorant Rank Up Guide — From Iron to Diamond",level:"intermediate",type:"guide",views:"134,000",read:"35 min",slug:"valorant-rank"},
  {id:10,game:"Valorant",title:"Valorant Beginner's Guide — Agents, Weapons & Maps",level:"beginner",type:"guide",views:"220,000",read:"18 min",slug:"valorant-beginners"},
  {id:11,game:"Baldur's Gate 3",title:"Baldur's Gate 3 — Best Classes & Builds for Every Playstyle",level:"intermediate",type:"guide",views:"77,000",read:"32 min",slug:"bg3-classes"},
  {id:12,game:"Baldur's Gate 3",title:"Baldur's Gate 3 Full Walkthrough — Act 1 to Act 3",level:"advanced",type:"walkthrough",views:"55,000",read:"120 min",slug:"bg3-walkthrough"},
  {id:13,game:"Minecraft",title:"Minecraft Survival Guide 2026 — From Dirt Hut to Diamond",level:"beginner",type:"guide",views:"310,000",read:"22 min",slug:"minecraft-survival"},
  {id:14,game:"Stardew Valley",title:"Stardew Valley Complete Farm Guide — Best Crops by Season",level:"beginner",type:"guide",views:"188,000",read:"20 min",slug:"stardew-crops"},
  {id:15,game:"Apex Legends",title:"Apex Legends — Best Legends Tier List 2026",level:"intermediate",type:"guide",views:"112,000",read:"16 min",slug:"apex-tier-list"},
  {id:16,game:"Elden Ring",title:"Elden Ring Rune Farming Guide — Level Up Fastest",level:"intermediate",type:"guide",views:"95,000",read:"10 min",slug:"elden-ring-runes"},
  {id:17,game:"GTA V",title:"GTA Online Money Guide — Fastest Ways to Make $1M",level:"beginner",type:"guide",views:"290,000",read:"14 min",slug:"gta-online-money"},
  {id:18,game:"Tekken 8",title:"Tekken 8 Frame Data & Combo Guide for Beginners",level:"beginner",type:"guide",views:"44,000",read:"24 min",slug:"tekken8-combos"},
];
let gFilter='';
function filterGuides(btn,f){
  gFilter=f;
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGuides();
}
function levelClass(l){return l==='beginner'?'gt-beginner':l==='intermediate'?'gt-intermediate':l==='advanced'?'gt-advanced':'gt-walkthrough'}
function levelLabel(l){return l.charAt(0).toUpperCase()+l.slice(1)}
function renderGuides(){
  const list=gFilter?GUIDES.filter(g=>g.level===gFilter||g.type===gFilter):GUIDES;
  document.getElementById('guides-grid').innerHTML=list.map(g=>`
    <a href="guides/${g.slug}.html" class="guide-card">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:11px;color:var(--muted);font-weight:600">📗 ${g.game}</span>
        <span class="guide-tag ${levelClass(g.level)}">${levelLabel(g.level)}</span>
      </div>
      <h3>${g.title}</h3>
      <p>Expert guide covering everything you need to master this topic. Written by experienced players.</p>
      <div class="guide-meta">
        <span class="guide-views">👁 ${g.views} views</span>
        <span>⏱ ${g.read} read</span>
      </div>
    </a>`).join('');
}
renderGuides();
</script>
</body>
</html>
